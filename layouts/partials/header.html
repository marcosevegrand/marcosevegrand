<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Title }} home">
      <span class="brand-name">{{ site.Title }}</span>
      <span class="brand-role">{{ site.Params.role }}</span>
    </a>

    <nav class="main-nav" aria-label="Main navigation">
      {{ range site.Menus.main }}
        <a href="{{ .URL }}" {{ if strings.HasPrefix .URL "/cv/" }}class="external-link" target="_blank" rel="noopener"{{ end }}>
          <span>{{ .Name }}</span>
          {{ if strings.HasPrefix .URL "/cv/" }}<span aria-hidden="true">↗</span>{{ end }}
        </a>
      {{ end }}
    </nav>
  </div>
</header>
