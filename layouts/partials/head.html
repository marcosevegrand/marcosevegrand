<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">

  {{ $title := cond .IsHome site.Title (printf "%s | %s" .Title site.Title) }}
  {{ $description := .Params.description | default site.Params.description }}
  <title>{{ $title }}</title>
  <meta name="description" content="{{ $description }}">
  <meta name="author" content="{{ site.Params.author }}">

  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  {{ with .OutputFormats.Get "RSS" }}<link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ .RelPermalink }}">{{ end }}

  <meta property="og:title" content="{{ $title }}">
  <meta property="og:description" content="{{ $description }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ absURL site.Params.ogImage }}">
  <meta name="twitter:card" content="summary_large_image">

  {{ $styles := resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $styles.RelPermalink }}" integrity="{{ $styles.Data.Integrity }}">
</head>
